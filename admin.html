<!DOCTYPE html>
<html>
<head>
  <title>City Hunt Admin</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, button { display: block; margin: 5px 0; padding: 5px; width: 250px; }
  </style>
</head>
<body>

<h2>Admin Panel</h2>

<h3>Add Object</h3>
<input id="name" placeholder="Name">
<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">
<input id="p1" placeholder="Photo 1">
<input id="p2" placeholder="Photo 2">
<button onclick="add()">Add</button>

<h3>Final Image</h3>
<input id="finalImg" placeholder="Final image URL">
<button onclick="saveFinal()">Save Final Image</button>

<h3>Objects</h3>
<div id="list"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADD OBJECT
function add(){
  db.ref("treasures").push({
    name: name.value,
    lat: parseFloat(lat.value),
    lng: parseFloat(lng.value),
    photo1: p1.value,
    photo2: p2.value,
    approved: false,
    status: "active"
  });
}

// SAVE FINAL IMAGE
function saveFinal(){
  db.ref("settings/finalImage").set(finalImg.value);
  alert("Saved!");
}

// LOAD OBJECTS
function load(){
  db.ref("treasures").on("value", snap=>{
    list.innerHTML="";
    snap.forEach(c=>{
      const t=c.val(), id=c.key;
      list.innerHTML+=`
        <b>${t.name}</b> (${t.status})<br>
        <button onclick="approve('${id}')">Approve</button>
        <button onclick="remove('${id}')">Delete</button>
        <hr>
      `;
    });
  });
}

// APPROVE FOUND OBJECT → DELETE IT
function approve(id){
  db.ref("treasures/"+id).remove();
  db.ref("events").push({type:"approved"}); // trigger fireworks
}

// DELETE
function remove(id){
  db.ref("treasures/"+id).remove();
}

load();
</script>

</body>
</html>
