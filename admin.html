<!DOCTYPE html>
<html>
<head>

<title>Admin</title>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>

</head>

<body>

<h2>Admin Panel</h2>

<div id="login">
Password: <input type="password" id="pass">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none">

<h3>Add Object</h3>

<input id="name" placeholder="Name"><br>
<input id="lat" placeholder="Lat"><br>
<input id="lng" placeholder="Lng"><br>
<input id="p1" placeholder="Photo 1"><br>
<input id="p2" placeholder="Photo 2"><br>

<button onclick="add()">Add</button>

<h3>Objects</h3>
<div id="list"></div>

</div>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyCZUQZ4qSxcdjP6uSv0o62jXDpz8SZqLBs",
 authDomain: "city-hunt-m-a.firebaseapp.com",
 databaseURL: "https://city-hunt-m-a-default-rtdb.europe-west1.firebasedatabase.app",
 projectId: "city-hunt-m-a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_PASS = "2006";

function login(){

 if(pass.value === ADMIN_PASS){

   login.style.display="none";
   panel.style.display="block";

   load();

 }else{
   alert("Wrong password");
 }

}

function add(){

 db.ref("treasures").push({
   name:name.value,
   lat:Number(lat.value),
   lng:Number(lng.value),
   photo1:p1.value,
   photo2:p2.value,
   status:"new",
   approved:false
 });

 alert("Added!");

}

function load(){

 db.ref("treasures").on("value", snap=>{

   list.innerHTML="";

   snap.forEach(child=>{

     let t=child.val();
     let id=child.key;

     let div=document.createElement("div");

     div.innerHTML=`
     <b>${t.name}</b><br>
     Status: ${t.status}<br>

     <button onclick="approve('${id}')">Approve</button>
     <button onclick="del('${id}')">Delete</button>
     <button onclick="edit('${id}')">Edit</button>
     <hr>
     `;

     list.appendChild(div);

   });

 });

}

function approve(id){

 db.ref("treasures/"+id).update({
   approved:true
 });

 alert("Approved 🎆");

}

function del(id){
 db.ref("treasures/"+id).remove();
}

function edit(id){

 let newName = prompt("New name?");
 if(newName){
   db.ref("treasures/"+id).update({
     name:newName
   });
 }

}

</script>

</body>
</html>
