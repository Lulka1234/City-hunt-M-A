<!DOCTYPE html>
<html>
<head>
  <title>City Hunt Admin</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { margin: 5px 0; width: 250px; padding: 5px; }
    button { margin: 5px; padding: 7px 12px; }
    hr { margin: 10px 0; }
    #panel { display: none; }
  </style>
</head>
<body>

<h2>City Hunt Admin Panel</h2>

<!-- LOGIN -->
<div id="login">
  Password: <input type="password" id="pass">
  <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel">

  <h3>Add New Object</h3>
  <input id="name" placeholder="Name"><br>
  <input id="lat" placeholder="Latitude"><br>
  <input id="lng" placeholder="Longitude"><br>
  <input id="p1" placeholder="Photo clue 1 URL"><br>
  <input id="p2" placeholder="Photo clue 2 URL"><br>
  <button onclick="add()">Add Object</button>

  <h3>All Objects</h3>
  <div id="list"></div>

</div>

<script>
  // ================= FIREBASE CONFIG =================
  const firebaseConfig = {
    apiKey: "AIzaSyCZUQZ4qSxcdjP6uSv0o62jXDpz8SZqLBs",
    authDomain: "city-hunt-m-a.firebaseapp.com",
    databaseURL: "https://city-hunt-m-a-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "city-hunt-m-a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ================= ADMIN PASSWORD =================
  const ADMIN_PASS = "2006"; 

  // ================= LOGIN FUNCTION =================
  function login() {
    const passInput = document.getElementById("pass");
    const input = passInput.value.trim();
    if(input === ADMIN_PASS){
      document.getElementById("login").style.display = "none";
      document.getElementById("panel").style.display = "block";
      loadObjects();
    } else {
      alert("Wrong password");
    }
  }

  // ================= ADD OBJECT =================
  function add() {
    const nameVal = document.getElementById("name").value.trim();
    const latVal = parseFloat(document.getElementById("lat").value);
    const lngVal = parseFloat(document.getElementById("lng").value);
    const p1Val = document.getElementById("p1").value.trim();
    const p2Val = document.getElementById("p2").value.trim();

    if(!nameVal || !latVal || !lngVal || !p1Val || !p2Val){
      alert("Please fill all fields!");
      return;
    }

    db.ref("treasures").push({
      name: nameVal,
      lat: latVal,
      lng: lngVal,
      photo1: p1Val,
      photo2: p2Val,
      status: "new",
      approved: false
    });

    alert("Object added!");
    document.getElementById("name").value = "";
    document.getElementById("lat").value = "";
    document.getElementById("lng").value = "";
    document.getElementById("p1").value = "";
    document.getElementById("p2").value = "";
  }

  // ================= LOAD OBJECTS =================
  function loadObjects() {
    const listDiv = document.getElementById("list");
    db.ref("treasures").on("value", snapshot => {
      listDiv.innerHTML = "";
      snapshot.forEach(child => {
        const t = child.val();
        const id = child.key;

        const div = document.createElement("div");
        div.innerHTML = `
          <b>${t.name}</b> (Status: ${t.status})<br>
          Approved: ${t.approved}<br>
          <button onclick="approve('${id}')">Approve</button>
          <button onclick="edit('${id}')">Edit</button>
          <button onclick="del('${id}')">Delete</button>
          <hr>
        `;
        listDiv.appendChild(div);
      });
    });
  }

  // ================= APPROVE OBJECT =================
  function approve(id) {
    db.ref("treasures/" + id).update({
      approved: true,
      status: "approved"
    });
    alert("Object approved!");
  }

  // ================= DELETE OBJECT =================
  function del(id) {
    if(confirm("Delete this object?")){
      db.ref("treasures/" + id).remove();
    }
  }

  // ================= EDIT OBJECT =================
  function edit(id) {
    const newName = prompt("New name:");
    if(newName){
      db.ref("treasures/" + id).update({ name: newName });
    }
  }

</script>

</body>
</html>
