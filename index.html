<!DOCTYPE html>
<html>
<head>
  <title>City Hunt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body { font-family: Arial; padding: 20px; }
    #game div { margin-bottom: 20px; }
    #map { height: 300px; width: 100%; display: none; margin-top: 10px; }
  </style>
</head>
<body>

<h2>City Hunt</h2>
<div id="game"></div>
<div id="map"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // --------------- FIREBASE CONFIG ----------------
  const firebaseConfig = {
  apiKey: "AIzaSyCZUQZ4qSxcdjP6uSv0o62jXDpz8SZqLBs",
  authDomain: "city-hunt-m-a.firebaseapp.com",
  databaseURL: "https://city-hunt-m-a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "city-hunt-m-a",
  storageBucket: "city-hunt-m-a.firebasestorage.app",
  messagingSenderId: "491976729596",
  appId: "1:491976729596:web:3eb2e6b4bcc8268d538879"
};
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let treasures = [];
  const gameDiv = document.getElementById("game");
  const mapDiv = document.getElementById("map");
  let map = null;

  db.ref("treasures").on("value", snap => {
    gameDiv.innerHTML = "";
    treasures = [];
    snap.forEach(child => {
      let t = child.val();
      t.id = child.key;
      if(!t.approved) treasures.push(t);
    });

    treasures.forEach(t => {
      let div = document.createElement("div");
      div.innerHTML = `
        <h3>${t.name}</h3>
        <button onclick="hint1('${t.id}')">Clue 1</button>
        <button onclick="hint2('${t.id}')">Clue 2</button>
        <div id="h-${t.id}"></div>
        <button onclick="found('${t.id}')">I FOUND IT</button>
        <p>Status: ${t.status || 'Not found'}</p>
      `;
      gameDiv.appendChild(div);
    });

    checkFinish();
  });

  function hint1(id){
    let t = treasures.find(x=>x.id===id);
    document.getElementById("h-"+id).innerHTML = `<img src="${t.photo1}" width="250">`;
  }

  function hint2(id){
    let t = treasures.find(x=>x.id===id);
    document.getElementById("h-"+id).innerHTML += `<img src="${t.photo2}" width="250">`;
    mapDiv.style.display = "block";
    if(!map){
      map = L.map('map').setView([t.lat,t.lng],14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }
  }

  function found(id){
    db.ref("treasures/"+id).update({ status:"pending" });
    alert("Waiting for admin approval...");
  }

  function checkFinish(){
    let remaining = treasures.filter(t=>!t.approved);
    if(remaining.length===0 && treasures.length>0){
      gameDiv.innerHTML = `<h2>🎉 All objects found!</h2><img src="https://t3.ftcdn.net/jpg/03/76/67/56/360_F_376675663_KfWjTqneCLrmq2pQthRGHFFH4T2rNLzX.jpg">`;
    }
  }
</script>

</body>
</html>
