<!DOCTYPE html>
<html>
<head>
  <title>City Hunt</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 5px; }
  </style>
</head>
<body>

<h2>City Hunt</h2>
<div id="game"></div>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// FIREWORKS
function fireworks(){
  const div=document.createElement("div");
  div.innerHTML="🎆 FOUND!";
  div.style.position="fixed";
  div.style.top="40%";
  div.style.left="50%";
  div.style.transform="translate(-50%,-50%)";
  div.style.fontSize="40px";
  div.style.background="black";
  div.style.color="white";
  div.style.padding="20px";
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),2000);
}

// LOAD GAME
function load(){
  db.ref("treasures").on("value", snap=>{
    game.innerHTML="";
    let count=0;

    snap.forEach(c=>{
      const t=c.val(), id=c.key;
      if(!t.approved) return;

      count++;

      game.innerHTML+=`
        <h3>${t.name}</h3>
        <button onclick="c1('${id}')">Clue 1</button>
        <button onclick="c2('${id}')">Clue 2</button>
        <div id="clue-${id}"></div>
        <button onclick="found('${id}')">FOUND</button>
        <hr>
      `;
    });

    if(count===0){
      db.ref("settings/finalImage").once("value").then(s=>{
        game.innerHTML+=`
          <h2>🎉 ALL FOUND</h2>
          <img src="${s.val()}" width="300">
        `;
      });
    }
  });
}

// CLUES
function c1(id){
  db.ref("treasures/"+id).once("value").then(s=>{
    clue(id, s.val().photo1);
  });
}

function c2(id){
  db.ref("treasures/"+id).once("value").then(s=>{
    const t=s.val();
    clue(id, t.photo2);
    document.getElementById("clue-"+id).innerHTML+=`
      <iframe width="300" height="200"
      src="https://maps.google.com/maps?q=${t.lat},${t.lng}&z=15&output=embed"></iframe>`;
  });
}

function clue(id,img){
  document.getElementById("clue-"+id).innerHTML=
    `<img src="${img}" width="200">`;
}

// FOUND → SEND TO ADMIN
function found(id){
  db.ref("treasures/"+id).update({
    approved:false,
    status:"pending"
  });
}

// FIREWORK TRIGGER
db.ref("events").on("child_added", snap=>{
  if(snap.val().type==="approved"){
    fireworks();
  }
});

load();
</script>

</body>
</html>
