<!DOCTYPE html>
<html>
<head>
  <title>City Hunt</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<h2>City Hunt</h2>
<div id="game"></div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyCZUQZ4qSxcdjP6uSv0o62jXDpz8SZqLBs",
  authDomain: "city-hunt-m-a.firebaseapp.com",
  databaseURL: "https://city-hunt-m-a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "city-hunt-m-a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// FIREWORKS
function fireworks(){
  const div=document.createElement("div");
  div.innerHTML="🎆 FOUND!";
  div.style.position="fixed";
  div.style.top="40%";
  div.style.left="50%";
  div.style.transform="translate(-50%,-50%)";
  div.style.fontSize="40px";
  div.style.background="black";
  div.style.color="white";
  div.style.padding="20px";
  document.body.appendChild(div);
  setTimeout(()=>div.remove(),2000);
}

// LOAD GAME
function load(){
  db.ref("treasures").on("value", snap=>{
    game.innerHTML="";
    let visibleCount = 0;

    snap.forEach(c=>{
      const t=c.val(), id=c.key;

      // ❌ hide only AFTER admin approves
      if(t.status === "approved") return;

      visibleCount++;

      game.innerHTML+=`
        <h3>${t.name}</h3>
        <button onclick="c1('${id}')">Clue 1</button>
        <button onclick="c2('${id}')">Clue 2</button>
        <div id="clue-${id}"></div>
        <button onclick="found('${id}')">FOUND</button>
        <p>Status: ${t.status}</p>
        <hr>
      `;
    });

    // FINAL IMAGE when nothing left
    if(visibleCount === 0){
      db.ref("settings/finalImage").once("value").then(s=>{
        game.innerHTML = `
          <h2>🎉 ALL FOUND 🎉</h2>
          <img src="${s.val()}" width="300">
        `;
      });
    }
  });
}

// CLUES
function c1(id){
  db.ref("treasures/"+id).once("value").then(s=>{
    document.getElementById("clue-"+id).innerHTML =
      `<img src="${s.val().photo1}" width="200">`;
  });
}

function c2(id){
  db.ref("treasures/"+id).once("value").then(s=>{
    const t=s.val();
    document.getElementById("clue-"+id).innerHTML =
      `<img src="${t.photo2}" width="200">
       <iframe width="300" height="200"
       src="https://maps.google.com/maps?q=${t.lat},${t.lng}&z=15&output=embed"></iframe>`;
  });
}

// PLAYER FOUND
function found(id){
  db.ref("treasures/"+id).update({
    status:"pending"
  });
  alert("Waiting for admin approval...");
}

// FIREWORK TRIGGER
db.ref("events").on("child_added", snap=>{
  if(snap.val().type==="approved"){
    fireworks();
  }
});

load();
</script>

</body>
</html>
